name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送形如 v1.0.0 的标签时触发
  workflow_dispatch:  # 允许手动触���

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来创建release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Build all versions
      run: |
        for i in 1 2 3; do
          echo "Attempt $i..."
          ./gradlew buildAndGather && break
          if [ $i -eq 3 ]; then
            echo "Build failed after 3 attempts"
            exit 1
          fi
          echo "Build failed, retrying in 15s..."
          sleep 15
        done

    - name: Get version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="manual-$(date +%Y%m%d-%H%M%S)"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Generate changelog
      id: changelog
      run: |
        CURRENT_TAG=${GITHUB_REF#refs/tags/}
        # 获取按版本排序的上一个 tag
        PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -A1 "^${CURRENT_TAG}$" | tail -n1)
        if [[ -n "$PREVIOUS_TAG" && "$PREVIOUS_TAG" != "$CURRENT_TAG" ]]; then
          CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..$CURRENT_TAG --no-merges)
        else
          CHANGELOG="首次发布"
        fi
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: Spectate ${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Spectate ${{ steps.get_version.outputs.VERSION }}

          ### 变更日志
          ${{ steps.changelog.outputs.CHANGELOG }}
        files: build/libs/*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
