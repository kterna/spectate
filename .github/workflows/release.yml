name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Spectate v${{ steps.get_version.outputs.version }}
        body: |
          ## Changes
          
          - Release version ${{ steps.get_version.outputs.version }}
          
          ## Downloads
          
          Download the `.jar` file below and place it in your server's `mods` folder.
          
          ### Requirements
          - Minecraft 1.21.x
          - Fabric Loader >= 0.14.9
          - Fabric API
        files: |
          fabric/build/libs/spectate-fabric-*.jar
        draft: false
        prerelease: false
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spectate-artifacts
        path: |
          fabric/build/libs/*.jar
          !fabric/build/libs/*-dev-shadow.jar
          !fabric/build/libs/*-sources.jar